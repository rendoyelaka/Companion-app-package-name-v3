name: Decompile, Rename & Repackage APK

on:
  push:
    branches:
      - main
      - master

jobs:
  rename-apk:
    runs-on: ubuntu-latest

    env:
      OLD_PKG: com.android.pictach
      NEW_PKG: com.pictach.app
      APK_NAME: companion.apk

    steps:

      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Install tools ───────────────────────────────────────────────────
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zipalign apksigner aapt

          APKTOOL_VER="2.9.3"
          wget -q "https://github.com/iBotPeaches/Apktool/releases/download/v${APKTOOL_VER}/apktool_${APKTOOL_VER}.jar" \
               -O /usr/local/bin/apktool.jar
          wget -q "https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool" \
               -O /usr/local/bin/apktool
          chmod +x /usr/local/bin/apktool
          apktool --version

      # ── 3. Verify APK exists ───────────────────────────────────────────────
      - name: Verify APK exists
        run: |
          if [ ! -f "${{ env.APK_NAME }}" ]; then
            echo "::error::${{ env.APK_NAME }} not found in repo root."
            exit 1
          fi
          ls -lh "${{ env.APK_NAME }}"

      # ── 4. Extract APK metadata ────────────────────────────────────────────
      - name: Extract APK metadata
        id: meta
        run: |
          INFO=$(aapt dump badging "${{ env.APK_NAME }}" 2>/dev/null | head -5)
          echo "$INFO"
          MIN_SDK=$(echo "$INFO" | grep -oP "(?<=minSdkVersion:')[0-9]+" || echo "28")
          TGT_SDK=$(echo "$INFO" | grep -oP "(?<=targetSdkVersion:')[0-9]+" || echo "33")
          VER_CODE=$(echo "$INFO" | grep -oP "(?<=versionCode=')[0-9]+" || echo "1")
          VER_NAME=$(echo "$INFO" | grep -oP "(?<=versionName=')[^']+" || echo "1.0")
          echo "min_sdk=$MIN_SDK"   >> $GITHUB_OUTPUT
          echo "tgt_sdk=$TGT_SDK"   >> $GITHUB_OUTPUT
          echo "ver_code=$VER_CODE" >> $GITHUB_OUTPUT
          echo "ver_name=$VER_NAME" >> $GITHUB_OUTPUT
          echo "✅ min=$MIN_SDK target=$TGT_SDK code=$VER_CODE name=$VER_NAME"

      # ── 5. Decompile APK ───────────────────────────────────────────────────
      - name: Decompile APK
        run: |
          apktool d "${{ env.APK_NAME }}" \
            -o decompiled \
            --no-res \
            --keep-broken-res \
            2>&1 | tee decompile.log
          echo "✅ Decompile done"

      # ── 6. Rename package ──────────────────────────────────────────────────
      - name: Rename package
        run: |
          OLD="${{ env.OLD_PKG }}"
          NEW="${{ env.NEW_PKG }}"
          sed -i "s|${OLD}|${NEW}|g" decompiled/AndroidManifest.xml
          sed -i "s|${OLD}\.verapp\.provider|${NEW}.verapp.provider|g" \
            decompiled/AndroidManifest.xml
          find decompiled/ -name "*.smali" \
            -exec sed -i "s|${OLD//.//}|${NEW//.//}|g" {} +
          grep -q "$NEW" decompiled/AndroidManifest.xml || \
            { echo "::error::New package not found."; exit 1; }
          grep -q "$OLD" decompiled/AndroidManifest.xml && \
            { echo "::error::Old package still present."; exit 1; }
          echo "✅ Rename verified"

      # ── 7. Restore apktool.yml ─────────────────────────────────────────────
      - name: Restore apktool.yml
        run: |
          cat > decompiled/apktool.yml << EOF
          version: 2.9.3
          apkFileName: ${{ env.APK_NAME }}
          isFrameworkApk: false
          usesFramework:
            ids:
            - 1
            tag: null
          sdkInfo:
            minSdkVersion: '${{ steps.meta.outputs.min_sdk }}'
            targetSdkVersion: '${{ steps.meta.outputs.tgt_sdk }}'
          packageInfo:
            forcedPackageId: '127'
            renameManifestPackage: '${{ env.NEW_PKG }}'
          versionInfo:
            versionCode: '${{ steps.meta.outputs.ver_code }}'
            versionName: '${{ steps.meta.outputs.ver_name }}'
          resourcesAreCompressed: false
          sharedLibrary: false
          sparseResources: false
          doNotCompress:
          - resources.arsc
          EOF
          echo "✅ apktool.yml restored"

      # ── 8. Repackage ──────────────────────────────────────────────────────
      - name: Repackage APK
        run: |
          apktool b decompiled \
            -o renamed_unsigned.apk \
            --no-res \
            2>&1 | tee repackage.log
          if [ ! -f renamed_unsigned.apk ] || [ ! -s renamed_unsigned.apk ]; then
            echo "::error::Repackage failed or produced empty file."
            exit 1
          fi
          ls -lh renamed_unsigned.apk
          echo "✅ Repackage done"

      # ── 9. Generate debug keystore ─────────────────────────────────────────
      - name: Generate debug keystore
        run: |
          keytool -genkeypair \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -noprompt
          echo "✅ Keystore ready"

      # ── 10. Zipalign ──────────────────────────────────────────────────────
      - name: Zipalign APK
        run: |
          zipalign -v 4 renamed_unsigned.apk renamed_aligned.apk 2>&1 | tee zipalign.log
          if [ ! -f renamed_aligned.apk ] || [ ! -s renamed_aligned.apk ]; then
            echo "::error::Zipalign failed or produced empty file."
            exit 1
          fi
          ls -lh renamed_aligned.apk
          echo "✅ Zipalign done"

      # ── 11. Sign APK in-place (no --out flag) ─────────────────────────────
      # apksigner --out produces 0 bytes on silent failure.
      # Sign in-place: copy aligned APK → sign it directly → verify size.
      - name: Sign APK
        run: |
          cp renamed_aligned.apk companion_renamed.apk

          apksigner sign \
            --ks debug.keystore \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            companion_renamed.apk 2>&1 | tee apksigner.log

          if [ ! -s companion_renamed.apk ]; then
            echo "::error::Signing produced empty APK."
            exit 1
          fi
          ls -lh companion_renamed.apk
          echo "✅ APK signed"

      # ── 12. Verify signature ──────────────────────────────────────────────
      - name: Verify APK signature
        run: |
          apksigner verify --verbose companion_renamed.apk 2>&1 | tee verify.log
          echo "✅ Signature verified"

      # ── 13. Upload APK ────────────────────────────────────────────────────
      - name: Upload renamed APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: companion-renamed-${{ env.NEW_PKG }}
          path: companion_renamed.apk
          retention-days: 7

      # ── 14. Collect ALL logs on failure ───────────────────────────────────
      - name: Collect error logs
        if: failure()
        run: |
          mkdir -p error_logs
          for f in decompile.log repackage.log zipalign.log apksigner.log verify.log; do
            [ -f "$f" ] && cp "$f" error_logs/
          done
          [ -f decompiled/AndroidManifest.xml ] && \
            cp decompiled/AndroidManifest.xml error_logs/
          [ -f decompiled/apktool.yml ] && \
            cp decompiled/apktool.yml error_logs/
          {
            echo "=== OLD ===" && echo "${{ env.OLD_PKG }}"
            echo "=== NEW ===" && echo "${{ env.NEW_PKG }}"
            echo "=== FILE SIZES ==="
            ls -lh renamed_unsigned.apk renamed_aligned.apk companion_renamed.apk 2>&1 || true
            echo "=== APK ===" && ls -lh "${{ env.APK_NAME }}" 2>&1 || true
            echo "=== APKTOOL ===" && apktool --version 2>&1 || true
            echo "=== JAVA ===" && java -version 2>&1 || true
          } >> error_logs/env_info.txt
          zip -r error_logs.zip error_logs/

      # ── 15. Upload error zip ──────────────────────────────────────────────
      - name: Upload error logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.zip
          retention-days: 7

name: Decompile, Rename & Repackage APK

on:
  push:
    branches:
      - main
      - master

jobs:
  rename-apk:
    runs-on: ubuntu-latest

    env:
      OLD_PKG: com.android.pictach
      NEW_PKG: com.pictach.app
      APK_NAME: companion.apk

    steps:

      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Install tools ───────────────────────────────────────────────────
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zipalign apksigner aapt

          APKTOOL_VER="2.9.3"
          wget -q "https://github.com/iBotPeaches/Apktool/releases/download/v${APKTOOL_VER}/apktool_${APKTOOL_VER}.jar" \
               -O /usr/local/bin/apktool.jar
          wget -q "https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool" \
               -O /usr/local/bin/apktool
          chmod +x /usr/local/bin/apktool
          apktool --version

      # ── 3. Verify APK exists ───────────────────────────────────────────────
      - name: Verify APK exists
        run: |
          if [ ! -f "${{ env.APK_NAME }}" ]; then
            echo "::error::${{ env.APK_NAME }} not found in repo root."
            exit 1
          fi
          echo "✅ Found: ${{ env.APK_NAME }}"

      # ── 4. Decompile APK (manifest + smali only, skip broken resources) ────
      - name: Decompile APK
        run: |
          apktool d "${{ env.APK_NAME }}" \
            -o decompiled \
            --no-res \
            --keep-broken-res \
            2>&1 | tee decompile.log
          echo "✅ Decompile done"
          ls decompiled/

      # ── 5. Rename package in manifest and smali ────────────────────────────
      - name: Rename package
        run: |
          OLD="${{ env.OLD_PKG }}"
          NEW="${{ env.NEW_PKG }}"

          echo "Renaming: $OLD → $NEW"

          # Manifest
          sed -i "s|${OLD}|${NEW}|g" decompiled/AndroidManifest.xml

          # smali files (if any)
          find decompiled/ -name "*.smali" \
            -exec sed -i "s|${OLD//.//}|${NEW//.//}|g" {} +

          # apktool.yml renameManifestPackage
          sed -i "s|renameManifestPackage: null|renameManifestPackage: '${NEW}'|g" \
            decompiled/apktool.yml

          # FileProvider authority
          sed -i "s|${OLD}\.verapp\.provider|${NEW}.verapp.provider|g" \
            decompiled/AndroidManifest.xml

          echo "✅ Rename done"

          # Verify
          if ! grep -q "$NEW" decompiled/AndroidManifest.xml; then
            echo "::error::New package not found in AndroidManifest.xml."
            exit 1
          fi
          if grep -q "$OLD" decompiled/AndroidManifest.xml; then
            echo "::error::Old package still present in AndroidManifest.xml."
            exit 1
          fi
          echo "✅ Verified: $NEW"

      # ── 6. Repackage (no resource recompile — use original resources.arsc) ─
      - name: Repackage APK
        run: |
          apktool b decompiled \
            -o renamed_unsigned.apk \
            --no-res \
            2>&1 | tee repackage.log

          if [ ! -f renamed_unsigned.apk ]; then
            echo "::error::Repackage failed."
            exit 1
          fi
          echo "✅ Repackage done"
          ls -lh renamed_unsigned.apk

      # ── 7. Generate debug keystore ─────────────────────────────────────────
      - name: Generate debug keystore
        run: |
          keytool -genkeypair \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -noprompt
          echo "✅ Keystore ready"

      # ── 8. Zipalign ────────────────────────────────────────────────────────
      - name: Zipalign APK
        run: |
          zipalign -v 4 renamed_unsigned.apk renamed_aligned.apk
          echo "✅ Zipalign done"

      # ── 9. Sign APK ────────────────────────────────────────────────────────
      - name: Sign APK
        run: |
          apksigner sign \
            --ks debug.keystore \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out companion_renamed.apk \
            renamed_aligned.apk
          echo "✅ APK signed"
          ls -lh companion_renamed.apk

      # ── 10. Verify signature ───────────────────────────────────────────────
      - name: Verify APK signature
        run: |
          apksigner verify --verbose companion_renamed.apk
          echo "✅ Signature verified"

      # ── 11. Upload APK ─────────────────────────────────────────────────────
      - name: Upload renamed APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: companion-renamed-${{ env.NEW_PKG }}
          path: companion_renamed.apk
          retention-days: 7

      # ── 12. Collect error logs on failure ──────────────────────────────────
      - name: Collect error logs
        if: failure()
        run: |
          mkdir -p error_logs
          [ -f decompile.log ]  && cp decompile.log  error_logs/
          [ -f repackage.log ]  && cp repackage.log  error_logs/
          [ -f decompiled/AndroidManifest.xml ] && \
            cp decompiled/AndroidManifest.xml error_logs/
          [ -f decompiled/apktool.yml ] && \
            cp decompiled/apktool.yml error_logs/
          {
            echo "=== OLD ===" && echo "${{ env.OLD_PKG }}"
            echo "=== NEW ===" && echo "${{ env.NEW_PKG }}"
            echo "=== APK ===" && ls -lh "${{ env.APK_NAME }}" 2>&1 || true
            echo "=== APKTOOL ===" && apktool --version 2>&1 || true
            echo "=== JAVA ===" && java -version 2>&1 || true
          } >> error_logs/env_info.txt
          zip -r error_logs.zip error_logs/

      # ── 13. Upload error zip ───────────────────────────────────────────────
      - name: Upload error logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.zip
          retention-days: 7

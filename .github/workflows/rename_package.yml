name: Rename APK Package (Binary Manifest + DEX Rename)

on:
  push:
    branches:
      - main
      - master

jobs:
  rename-apk:
    runs-on: ubuntu-latest

    env:
      OLD_PKG: com.android.pictach
      NEW_PKG: com.pictach.app
      APK_NAME: companion.apk

    steps:

      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Install tools ───────────────────────────────────────────────────
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zipalign apksigner aapt

          APKTOOL_VER="2.9.3"
          wget -q "https://github.com/iBotPeaches/Apktool/releases/download/v${APKTOOL_VER}/apktool_${APKTOOL_VER}.jar" \
               -O /usr/local/bin/apktool.jar
          wget -q "https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool" \
               -O /usr/local/bin/apktool
          chmod +x /usr/local/bin/apktool
          apktool --version

      # ── 3. Verify APK exists ───────────────────────────────────────────────
      - name: Verify APK exists
        run: |
          if [ ! -f "${{ env.APK_NAME }}" ]; then
            echo "::error::${{ env.APK_NAME }} not found in repo root."
            exit 1
          fi
          ls -lh "${{ env.APK_NAME }}"

      # ── 4. Extract APK metadata ────────────────────────────────────────────
      - name: Extract APK metadata
        id: meta
        run: |
          INFO=$(aapt dump badging "${{ env.APK_NAME }}" 2>/dev/null | head -5)
          echo "$INFO"
          MIN_SDK=$(echo "$INFO" | grep -oP "(?<=minSdkVersion:')[0-9]+" || echo "28")
          TGT_SDK=$(echo "$INFO" | grep -oP "(?<=targetSdkVersion:')[0-9]+" || echo "33")
          VER_CODE=$(echo "$INFO" | grep -oP "(?<=versionCode=')[0-9]+" || echo "1")
          VER_NAME=$(echo "$INFO" | grep -oP "(?<=versionName=')[^']+" || echo "1.0")
          echo "min_sdk=$MIN_SDK"   >> $GITHUB_OUTPUT
          echo "tgt_sdk=$TGT_SDK"   >> $GITHUB_OUTPUT
          echo "ver_code=$VER_CODE" >> $GITHUB_OUTPUT
          echo "ver_name=$VER_NAME" >> $GITHUB_OUTPUT
          echo "✅ min=$MIN_SDK target=$TGT_SDK code=$VER_CODE name=$VER_NAME"

      # ── 5. Decompile APK (smali only, no resources) ───────────────────────
      - name: Decompile APK
        run: |
          apktool d "${{ env.APK_NAME }}" \
            -o decompiled \
            --no-res \
            --keep-broken-res \
            2>&1 | tee decompile.log
          echo "✅ Decompile done"

      # ── 6. Rename smali class paths + string literals ──────────────────────
      # WHY: classes.dex class paths must match the component names declared in
      # AndroidManifest.xml. Without renaming smali, Android tries to load
      # com.pictach.app.MainActivity but finds only com.android.pictach.MainActivity
      # in classes.dex → ClassNotFoundException → instant crash on launch.
      - name: Rename smali
        run: |
          OLD="${{ env.OLD_PKG }}"
          NEW="${{ env.NEW_PKG }}"
          OLD_PATH="${OLD//.//}"   # com/android/pictach
          NEW_PATH="${NEW//.//}"   # com/pictach/app

          # Rename slash-format class refs in all smali files
          find decompiled/smali -name "*.smali" \
            -exec sed -i "s|${OLD_PATH}|${NEW_PATH}|g" {} +

          # Rename dot-format string literals in all smali files
          find decompiled/smali -name "*.smali" \
            -exec sed -i "s|${OLD}|${NEW}|g" {} +

          # Move the smali directory itself
          if [ -d "decompiled/smali/com/android/pictach" ]; then
            mkdir -p "decompiled/smali/com/pictach"
            mv "decompiled/smali/com/android/pictach" \
               "decompiled/smali/com/pictach/app"
          fi

          # Verify
          OLD_COUNT=$(grep -r "${OLD_PATH}" decompiled/smali/ | wc -l)
          NEW_COUNT=$(grep -r "${NEW_PATH}" decompiled/smali/ | wc -l)
          echo "Old refs remaining: ${OLD_COUNT}"
          echo "New refs present:   ${NEW_COUNT}"
          if [ "$OLD_COUNT" -gt 0 ]; then
            echo "::error::Old package path still present in smali after rename."
            exit 1
          fi
          echo "✅ Smali renamed"

      # ── 7. Restore apktool.yml ─────────────────────────────────────────────
      - name: Restore apktool.yml
        run: |
          cat > decompiled/apktool.yml << EOF
          version: 2.9.3
          apkFileName: ${{ env.APK_NAME }}
          isFrameworkApk: false
          usesFramework:
            ids:
            - 1
            tag: null
          sdkInfo:
            minSdkVersion: '${{ steps.meta.outputs.min_sdk }}'
            targetSdkVersion: '${{ steps.meta.outputs.tgt_sdk }}'
          packageInfo:
            forcedPackageId: '127'
            renameManifestPackage: null
          versionInfo:
            versionCode: '${{ steps.meta.outputs.ver_code }}'
            versionName: '${{ steps.meta.outputs.ver_name }}'
          resourcesAreCompressed: false
          sharedLibrary: false
          sparseResources: false
          doNotCompress:
          - resources.arsc
          EOF
          echo "✅ apktool.yml restored"

      # ── 8. Repackage smali → classes.dex only ─────────────────────────────
      # apktool b --no-res recompiles smali to classes.dex and reuses original
      # resources.arsc. We extract only classes.dex from this output.
      - name: Rebuild classes.dex
        run: |
          apktool b decompiled \
            -o smali_rebuilt.apk \
            --no-res \
            2>&1 | tee repackage.log

          if [ ! -f smali_rebuilt.apk ] || [ ! -s smali_rebuilt.apk ]; then
            echo "::error::apktool repackage failed or produced empty file."
            exit 1
          fi

          # Extract just the new classes.dex
          unzip -p smali_rebuilt.apk classes.dex > new_classes.dex
          if [ ! -s new_classes.dex ]; then
            echo "::error::classes.dex extraction failed or empty."
            exit 1
          fi
          ls -lh new_classes.dex
          echo "✅ classes.dex rebuilt"

      # ── 9. Binary-patch AndroidManifest.xml + assemble final APK ──────────
      # WHY binary patch instead of apktool manifest output:
      # apktool b --no-res rewrites the binary AXML manifest but does NOT update
      # the string pool chunk size header → corrupt manifest → no install button.
      # We patch the original binary manifest directly, keeping all headers valid.
      - name: Patch manifest and assemble final APK
        run: |
          python3 << 'PYEOF'
          import zipfile, struct, os, sys

          APK_IN   = "${{ env.APK_NAME }}"
          DEX_FILE = "new_classes.dex"
          APK_OUT  = "renamed_unsigned.apk"
          OLD      = b"${{ env.OLD_PKG }}"
          NEW      = b"${{ env.NEW_PKG }}"
          DELTA    = len(NEW) - len(OLD)

          # ── Read new classes.dex ────────────────────────────────────────────
          with open(DEX_FILE, "rb") as f:
              new_dex = f.read()
          print(f"New classes.dex: {len(new_dex)} bytes")

          # ── Binary-patch AndroidManifest.xml ────────────────────────────────
          # AXML format (UTF-8 string pool):
          #   File header:  magic(4) + fileSize(4)
          #   SP chunk:     type(4) + chunkSize(4) + strCount(4) + styleCount(4)
          #                 + flags(4) + stringsStart(4) + stylesStart(4)
          #   Offset table: strCount × uint32
          #   String data:  each entry = charcount(1) + bytecount(1) + chars + null(1)
          #   XML tree:     unchanged

          with zipfile.ZipFile(APK_IN, "r") as z:
              manifest_raw = z.read("AndroidManifest.xml")

          SP           = 8
          sp_size      = struct.unpack_from("<I", manifest_raw, SP+4)[0]
          str_count    = struct.unpack_from("<I", manifest_raw, SP+8)[0]
          strs_start   = struct.unpack_from("<I", manifest_raw, SP+20)[0]
          str_data_abs = SP + strs_start
          offsets_abs  = SP + 28
          sp_end       = SP + sp_size
          xml_tree     = manifest_raw[sp_end:]

          # Read all string entries
          entries = []
          for i in range(str_count):
              off = struct.unpack_from("<I", manifest_raw, offsets_abs + i*4)[0]
              pos = str_data_abs + off
              cc  = manifest_raw[pos]
              bc  = manifest_raw[pos+1]
              ch  = manifest_raw[pos+2:pos+2+bc]
              assert manifest_raw[pos+2+bc] == 0, f"String {i} missing null terminator"
              entries.append((cc, bc, ch))

          # Rebuild string data with OLD→NEW replacement and updated length prefixes
          new_str_data = bytearray()
          new_offsets  = []
          replaced     = 0
          for (cc, bc, ch) in entries:
              new_offsets.append(len(new_str_data))
              if OLD in ch:
                  new_ch = ch.replace(OLD, NEW)
                  new_str_data.extend([cc + DELTA, bc + DELTA])
                  new_str_data.extend(new_ch)
                  new_str_data.append(0)
                  replaced += 1
              else:
                  new_str_data.extend([cc, bc])
                  new_str_data.extend(ch)
                  new_str_data.append(0)

          if replaced == 0:
              print("ERROR: No strings replaced in manifest — OLD package not found")
              sys.exit(1)

          # Assemble patched manifest
          new_sp_size = 28 + str_count*4 + len(new_str_data)
          result = bytearray()
          result.extend(manifest_raw[0:8])          # file header
          result.extend(manifest_raw[SP:SP+28])     # SP chunk header
          for off in new_offsets:
              result.extend(struct.pack("<I", off)) # updated offset table
          result.extend(new_str_data)               # patched string data
          result.extend(xml_tree)                   # XML tree unchanged
          struct.pack_into("<I", result, 4,    len(result))   # fix file size
          struct.pack_into("<I", result, SP+4, new_sp_size)   # fix SP chunk size

          new_manifest = bytes(result)
          print(f"Manifest: {len(manifest_raw)}→{len(new_manifest)} bytes, {replaced} strings replaced")

          # ── Binary-patch resources.arsc ─────────────────────────────────────
          # WHY: resources.arsc contains a RES_TABLE_PACKAGE chunk whose 256-byte
          # name field (UTF-16LE, null-padded) stores the app package name.
          # The workflow previously patched only AndroidManifest.xml and classes.dex
          # but left this field unchanged → aapt/PackageManager still reads the old
          # package name from resources.arsc at install time.
          #
          # FIX: locate the RES_TABLE_PACKAGE chunk (type=0x0200) with a valid
          # header size (288 bytes) and overwrite the name field in-place.
          # The 256-byte field is fixed-size so no chunk-size headers change.
          #
          # RES_TABLE_PACKAGE layout (offsets from chunk start):
          #   +0  type       uint16 = 0x0200
          #   +2  headerSize uint16 = 288
          #   +4  chunkSize  uint32
          #   +8  id         uint32
          #   +12 name       char16[128]  ← 256 bytes, UTF-16LE, null-padded

          with zipfile.ZipFile(APK_IN, "r") as z:
              arsc_raw = bytearray(z.read("resources.arsc"))

          OLD_UTF16 = OLD.decode("ascii").encode("utf-16-le") + b"\x00\x00"
          NEW_UTF16 = NEW.decode("ascii").encode("utf-16-le") + b"\x00\x00"
          assert len(NEW_UTF16) <= 256, "New package name too long for resources.arsc name field"

          arsc_patched = 0
          pos = 0
          while pos < len(arsc_raw) - 8:
              chunk_type = struct.unpack_from("<H", arsc_raw, pos)[0]
              hdr_size   = struct.unpack_from("<H", arsc_raw, pos + 2)[0]
              chunk_size = struct.unpack_from("<I", arsc_raw, pos + 4)[0]
              if chunk_type == 0x0200 and hdr_size == 288 and 1000 < chunk_size < len(arsc_raw):
                  name_off = pos + 12
                  name_field = arsc_raw[name_off:name_off + 256]
                  if OLD_UTF16 in name_field:
                      new_name_field = bytearray(256)
                      new_name_field[:len(NEW_UTF16)] = NEW_UTF16
                      arsc_raw[name_off:name_off + 256] = new_name_field
                      arsc_patched += 1
                      print(f"  ✓ resources.arsc RES_TABLE_PACKAGE name patched at offset {hex(pos)}")
              pos += 1

          if arsc_patched == 0:
              print("ERROR: Old package name not found in resources.arsc RES_TABLE_PACKAGE chunk")
              sys.exit(1)

          new_arsc = bytes(arsc_raw)
          print(f"resources.arsc: {len(arsc_raw)} bytes, {arsc_patched} package chunk(s) patched")

          # ── Assemble final APK ───────────────────────────────────────────────
          # Source:   original APK (all files unchanged)
          # Override: AndroidManifest.xml → binary-patched version
          # Override: classes.dex        → smali-renamed version
          # Override: resources.arsc     → package name field patched
          tmp = APK_OUT + ".tmp"
          with zipfile.ZipFile(APK_IN, "r") as zin:
              with zipfile.ZipFile(tmp, "w", allowZip64=False) as zout:
                  for item in zin.infolist():
                      if item.filename == "AndroidManifest.xml":
                          zout.writestr(item, new_manifest)
                          print("  ✓ AndroidManifest.xml replaced (binary patched)")
                      elif item.filename == "classes.dex":
                          zout.writestr(item, new_dex)
                          print("  ✓ classes.dex replaced (smali renamed)")
                      elif item.filename == "resources.arsc":
                          zout.writestr(item, new_arsc)
                          print("  ✓ resources.arsc replaced (package name patched)")
                      else:
                          zout.writestr(item, zin.read(item.filename))

          os.replace(tmp, APK_OUT)
          print(f"Output: {APK_OUT} ({os.path.getsize(APK_OUT)} bytes)")
          PYEOF

          if [ ! -f renamed_unsigned.apk ] || [ ! -s renamed_unsigned.apk ]; then
            echo "::error::Final APK assembly failed."
            exit 1
          fi
          ls -lh renamed_unsigned.apk
          echo "✅ Manifest patched and APK assembled"

      # ── 10. Generate debug keystore ────────────────────────────────────────
      - name: Generate debug keystore
        run: |
          keytool -genkeypair \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -noprompt
          echo "✅ Keystore ready"

      # ── 11. Zipalign ──────────────────────────────────────────────────────
      - name: Zipalign APK
        run: |
          zipalign -v 4 renamed_unsigned.apk renamed_aligned.apk 2>&1 | tee zipalign.log
          if [ ! -f renamed_aligned.apk ] || [ ! -s renamed_aligned.apk ]; then
            echo "::error::Zipalign failed or produced empty file."
            exit 1
          fi
          ls -lh renamed_aligned.apk
          echo "✅ Zipalign done"

      # ── 12. Sign APK in-place (no --out flag) ──────────────────────────────
      # apksigner --out produces 0 bytes on silent failure; sign in-place to catch this.
      - name: Sign APK
        run: |
          cp renamed_aligned.apk companion_renamed.apk
          apksigner sign \
            --ks debug.keystore \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            companion_renamed.apk 2>&1 | tee apksigner.log
          if [ ! -s companion_renamed.apk ]; then
            echo "::error::Signing produced empty APK."
            exit 1
          fi
          ls -lh companion_renamed.apk
          echo "✅ APK signed"

      # ── 13. Verify signature ───────────────────────────────────────────────
      - name: Verify APK signature
        run: |
          apksigner verify --verbose companion_renamed.apk 2>&1 | tee verify.log
          echo "✅ Signature verified"

      # ── 14. Upload APK ────────────────────────────────────────────────────
      - name: Upload renamed APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: companion-renamed-${{ env.NEW_PKG }}
          path: companion_renamed.apk
          retention-days: 7

      # ── 15. Collect error logs on failure ─────────────────────────────────
      - name: Collect error logs
        if: failure()
        run: |
          mkdir -p error_logs
          for f in decompile.log repackage.log zipalign.log apksigner.log verify.log; do
            [ -f "$f" ] && cp "$f" error_logs/
          done
          [ -f decompiled/AndroidManifest.xml ] && cp decompiled/AndroidManifest.xml error_logs/
          [ -f decompiled/apktool.yml ]         && cp decompiled/apktool.yml error_logs/
          {
            echo "=== OLD ===" && echo "${{ env.OLD_PKG }}"
            echo "=== NEW ===" && echo "${{ env.NEW_PKG }}"
            echo "=== FILE SIZES ==="
            ls -lh renamed_unsigned.apk renamed_aligned.apk companion_renamed.apk smali_rebuilt.apk new_classes.dex 2>&1 || true
            echo "=== APK ===" && ls -lh "${{ env.APK_NAME }}" 2>&1 || true
            echo "=== APKTOOL ===" && apktool --version 2>&1 || true
            echo "=== JAVA ===" && java -version 2>&1 || true
          } >> error_logs/env_info.txt
          zip -r error_logs.zip error_logs/

      # ── 16. Upload error zip ──────────────────────────────────────────────
      - name: Upload error logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.zip
          retention-days: 7

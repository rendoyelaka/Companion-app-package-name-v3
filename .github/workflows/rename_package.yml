name: Rename APK Package (Binary AXML Patch)

on:
  push:
    branches:
      - main
      - master

jobs:
  rename-apk:
    runs-on: ubuntu-latest

    env:
      OLD_PKG: com.android.pictach
      NEW_PKG: com.pictach.app
      APK_NAME: companion.apk

    steps:

      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Install tools ───────────────────────────────────────────────────
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zipalign apksigner

      # ── 3. Verify APK exists ───────────────────────────────────────────────
      - name: Verify APK exists
        run: |
          if [ ! -f "${{ env.APK_NAME }}" ]; then
            echo "::error::${{ env.APK_NAME }} not found in repo root."
            exit 1
          fi
          ls -lh "${{ env.APK_NAME }}"

      # ── 4. Binary-patch AndroidManifest.xml + repack APK ──────────────────
      # This approach patches the binary AXML manifest directly (no apktool).
      # Reason: apktool repackage corrupts the binary manifest header when using
      # --no-res, producing an invalid AXML chunk size (the root cause of the
      # "Bad XML block" error and missing install button in the previous build).
      - name: Patch manifest and repack APK
        run: |
          python3 << 'PYEOF'
          import zipfile, struct, os, sys

          APK_IN  = "${{ env.APK_NAME }}"
          APK_OUT = "renamed_unsigned.apk"
          OLD     = b"${{ env.OLD_PKG }}"
          NEW     = b"${{ env.NEW_PKG }}"
          DELTA   = len(NEW) - len(OLD)

          # ── Read original APK ──────────────────────────────────────────────
          with zipfile.ZipFile(APK_IN, "r") as zin:
              manifest_raw = zin.read("AndroidManifest.xml")

          print(f"Original manifest size: {len(manifest_raw)} bytes")
          print(f"OLD occurrences (raw): {manifest_raw.count(OLD)}")

          # ── Parse AXML string pool ─────────────────────────────────────────
          # File layout:
          #   [0:4]   magic (0x00080003)
          #   [4:8]   fileSize
          #   [8:12]  SP chunk type (0x001C0001)
          #   [12:16] SP chunk size
          #   [16:20] stringCount
          #   [20:24] styleCount
          #   [24:28] flags  (0x100 = UTF-8)
          #   [28:32] stringsStart (relative to SP chunk start = offset 8)
          #   [32:36] stylesStart
          #   [36 : 36+stringCount*4]  string offset table
          #   [8+stringsStart : ...]   string data
          #   UTF-8 string entry: charcount(1) + bytecount(1) + chars(bytecount) + null(1)

          SP = 8
          sp_size     = struct.unpack_from("<I", manifest_raw, SP + 4)[0]
          str_count   = struct.unpack_from("<I", manifest_raw, SP + 8)[0]
          strs_start  = struct.unpack_from("<I", manifest_raw, SP + 20)[0]
          str_data_abs = SP + strs_start
          offsets_abs  = SP + 28   # offset table starts right after 7-field SP header

          sp_end = SP + sp_size
          xml_tree = manifest_raw[sp_end:]   # XML tree chunk — never modified

          print(f"SP: strCount={str_count}, stringsStart={strs_start}, SP ends at {sp_end}")

          # ── Read all string entries ────────────────────────────────────────
          entries = []
          for i in range(str_count):
              off = struct.unpack_from("<I", manifest_raw, offsets_abs + i * 4)[0]
              pos = str_data_abs + off
              cc  = manifest_raw[pos]
              bc  = manifest_raw[pos + 1]
              ch  = manifest_raw[pos + 2 : pos + 2 + bc]
              assert manifest_raw[pos + 2 + bc] == 0, f"String {i} missing null terminator"
              entries.append((cc, bc, ch))

          # ── Rebuild string data with replacements ──────────────────────────
          new_str_data = bytearray()
          new_offsets  = []
          replaced     = 0

          for (cc, bc, ch) in entries:
              new_offsets.append(len(new_str_data))
              if OLD in ch:
                  new_ch  = ch.replace(OLD, NEW)
                  new_bc  = bc + DELTA
                  new_cc  = cc + DELTA
                  new_str_data.append(new_cc)
                  new_str_data.append(new_bc)
                  new_str_data.extend(new_ch)
                  new_str_data.append(0)
                  replaced += 1
              else:
                  new_str_data.append(cc)
                  new_str_data.append(bc)
                  new_str_data.extend(ch)
                  new_str_data.append(0)

          print(f"Strings replaced: {replaced}")
          if replaced == 0:
              print("ERROR: No strings replaced — OLD package not found in manifest string pool")
              sys.exit(1)

          # ── Assemble patched manifest ──────────────────────────────────────
          new_sp_size = 28 + str_count * 4 + len(new_str_data)
          result      = bytearray()

          result.extend(manifest_raw[0:8])             # file header magic + filesize placeholder
          result.extend(manifest_raw[SP : SP + 28])    # SP chunk header (7 fields)

          for off in new_offsets:                      # new offset table
              result.extend(struct.pack("<I", off))

          result.extend(new_str_data)                  # new string data
          result.extend(xml_tree)                      # XML tree unchanged

          # Fix file size and SP chunk size
          struct.pack_into("<I", result, 4,       len(result))
          struct.pack_into("<I", result, SP + 4,  new_sp_size)

          print(f"Patched manifest size: {len(result)} bytes")

          # ── Verify ────────────────────────────────────────────────────────
          patched_bytes = bytes(result)
          if OLD in patched_bytes:
              # Check if old pkg still in string pool (not just in XML tree refs)
              sp_end_new = SP + new_sp_size
              if OLD in patched_bytes[:sp_end_new]:
                  print("ERROR: OLD package still present in patched string pool")
                  sys.exit(1)
          if NEW not in patched_bytes:
              print("ERROR: NEW package not found in patched manifest")
              sys.exit(1)

          # ── Repack APK (preserving original compression types) ─────────────
          tmp_apk = APK_OUT + ".tmp"
          with zipfile.ZipFile(APK_IN, "r") as zin:
              with zipfile.ZipFile(tmp_apk, "w", allowZip64=False) as zout:
                  for item in zin.infolist():
                      if item.filename == "AndroidManifest.xml":
                          zout.writestr(item, bytes(result))
                          print(f"  Replaced: AndroidManifest.xml")
                      else:
                          zout.writestr(item, zin.read(item.filename))

          os.replace(tmp_apk, APK_OUT)
          print(f"Repacked APK: {APK_OUT} ({os.path.getsize(APK_OUT)} bytes)")
          PYEOF

          if [ ! -f renamed_unsigned.apk ] || [ ! -s renamed_unsigned.apk ]; then
            echo "::error::Patch/repack failed or produced empty file."
            exit 1
          fi
          ls -lh renamed_unsigned.apk
          echo "✅ Manifest patched and APK repacked"

      # ── 5. Generate debug keystore ─────────────────────────────────────────
      - name: Generate debug keystore
        run: |
          keytool -genkeypair \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -noprompt
          echo "✅ Keystore ready"

      # ── 6. Zipalign ───────────────────────────────────────────────────────
      - name: Zipalign APK
        run: |
          zipalign -v 4 renamed_unsigned.apk renamed_aligned.apk 2>&1 | tee zipalign.log
          if [ ! -f renamed_aligned.apk ] || [ ! -s renamed_aligned.apk ]; then
            echo "::error::Zipalign failed or produced empty file."
            exit 1
          fi
          ls -lh renamed_aligned.apk
          echo "✅ Zipalign done"

      # ── 7. Sign APK in-place (no --out flag) ──────────────────────────────
      # apksigner --out produces 0 bytes on silent failure; sign in-place to catch this.
      - name: Sign APK
        run: |
          cp renamed_aligned.apk companion_renamed.apk
          apksigner sign \
            --ks debug.keystore \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            companion_renamed.apk 2>&1 | tee apksigner.log
          if [ ! -s companion_renamed.apk ]; then
            echo "::error::Signing produced empty APK."
            exit 1
          fi
          ls -lh companion_renamed.apk
          echo "✅ APK signed"

      # ── 8. Verify signature ───────────────────────────────────────────────
      - name: Verify APK signature
        run: |
          apksigner verify --verbose companion_renamed.apk 2>&1 | tee verify.log
          echo "✅ Signature verified"

      # ── 9. Upload APK ─────────────────────────────────────────────────────
      - name: Upload renamed APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: companion-renamed-${{ env.NEW_PKG }}
          path: companion_renamed.apk
          retention-days: 7

      # ── 10. Collect error logs on failure ─────────────────────────────────
      - name: Collect error logs
        if: failure()
        run: |
          mkdir -p error_logs
          for f in zipalign.log apksigner.log verify.log; do
            [ -f "$f" ] && cp "$f" error_logs/
          done
          {
            echo "=== OLD ===" && echo "${{ env.OLD_PKG }}"
            echo "=== NEW ===" && echo "${{ env.NEW_PKG }}"
            echo "=== FILE SIZES ==="
            ls -lh renamed_unsigned.apk renamed_aligned.apk companion_renamed.apk 2>&1 || true
            echo "=== APK ===" && ls -lh "${{ env.APK_NAME }}" 2>&1 || true
            echo "=== JAVA ===" && java -version 2>&1 || true
          } >> error_logs/env_info.txt
          zip -r error_logs.zip error_logs/

      # ── 11. Upload error zip ──────────────────────────────────────────────
      - name: Upload error logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.zip
          retention-days: 7

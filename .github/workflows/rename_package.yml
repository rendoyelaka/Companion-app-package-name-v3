name: Decompile, Rename & Repackage APK

on:
  push:
    branches:
      - main
      - master

jobs:
  rename-apk:
    runs-on: ubuntu-latest

    env:
      OLD_PKG: com.android.pictach
      NEW_PKG: com.pictach.app
      APK_NAME: companion.apk

    steps:

      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Install dependencies ────────────────────────────────────────────
      - name: Install apktool, zipalign, apksigner
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zipalign apksigner

          # Install latest apktool
          APKTOOL_VER="2.9.3"
          wget -q "https://github.com/iBotPeaches/Apktool/releases/download/v${APKTOOL_VER}/apktool_${APKTOOL_VER}.jar" \
               -O /usr/local/bin/apktool.jar
          wget -q "https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool" \
               -O /usr/local/bin/apktool
          chmod +x /usr/local/bin/apktool
          apktool --version

      # ── 3. Verify APK exists ───────────────────────────────────────────────
      - name: Verify APK exists
        run: |
          if [ ! -f "${{ env.APK_NAME }}" ]; then
            echo "::error::${{ env.APK_NAME }} not found in repository root."
            exit 1
          fi
          echo "✅ Found: ${{ env.APK_NAME }}"
          ls -lh "${{ env.APK_NAME }}"

      # ── 4. Decompile APK ───────────────────────────────────────────────────
      - name: Decompile APK with apktool
        run: |
          apktool d "${{ env.APK_NAME }}" -o decompiled --no-src 2>&1 | tee decompile.log
          echo "✅ Decompile done"
          ls decompiled/

      # ── 5. Rename package in all decompiled files ──────────────────────────
      - name: Rename package name
        run: |
          OLD="${{ env.OLD_PKG }}"
          NEW="${{ env.NEW_PKG }}"

          echo "Renaming: $OLD → $NEW"

          # Replace in all text files (xml, smali, properties, etc.)
          find decompiled/ -type f \
            \( -name "*.xml" -o -name "*.smali" \
               -o -name "*.properties" -o -name "*.json" \
               -o -name "*.txt" \) \
            -exec sed -i "s|${OLD}|${NEW}|g" {} +

          # Rename package in apktool.yml
          sed -i "s|${OLD}|${NEW}|g" decompiled/apktool.yml

          # Fix FileProvider authority
          OLD_AUTH="${OLD}.verapp.provider"
          NEW_AUTH="${NEW}.verapp.provider"
          find decompiled/ -type f -name "*.xml" \
            -exec sed -i "s|${OLD_AUTH}|${NEW_AUTH}|g" {} +

          echo "✅ Rename done"

          # Verify new package present
          if ! grep -rq "$NEW" decompiled/AndroidManifest.xml; then
            echo "::error::New package not found in AndroidManifest.xml after rename."
            exit 1
          fi

          # Verify old package gone from manifest
          if grep -q "$OLD" decompiled/AndroidManifest.xml; then
            echo "::error::Old package still present in AndroidManifest.xml."
            exit 1
          fi

          echo "✅ Package verified in manifest"

      # ── 6. Repackage APK ───────────────────────────────────────────────────
      - name: Repackage APK with apktool
        run: |
          apktool b decompiled -o renamed_unsigned.apk 2>&1 | tee repackage.log
          if [ ! -f renamed_unsigned.apk ]; then
            echo "::error::Repackage failed — renamed_unsigned.apk not created."
            exit 1
          fi
          echo "✅ Repackage done"
          ls -lh renamed_unsigned.apk

      # ── 7. Generate debug keystore ─────────────────────────────────────────
      - name: Generate debug keystore
        run: |
          keytool -genkeypair \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -noprompt
          echo "✅ Keystore generated"

      # ── 8. Zipalign ────────────────────────────────────────────────────────
      - name: Zipalign APK
        run: |
          zipalign -v 4 renamed_unsigned.apk renamed_aligned.apk
          echo "✅ Zipalign done"

      # ── 9. Sign APK ────────────────────────────────────────────────────────
      - name: Sign APK
        run: |
          apksigner sign \
            --ks debug.keystore \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out companion_renamed.apk \
            renamed_aligned.apk
          echo "✅ Signed APK ready"
          ls -lh companion_renamed.apk

      # ── 10. Verify signed APK ──────────────────────────────────────────────
      - name: Verify signed APK
        run: |
          apksigner verify --verbose companion_renamed.apk
          echo "✅ APK signature verified"

      # ── 11. Upload final APK artifact ──────────────────────────────────────
      - name: Upload renamed APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: companion-renamed-${{ env.NEW_PKG }}
          path: companion_renamed.apk
          retention-days: 7

      # ── 12. Collect error logs on failure ──────────────────────────────────
      - name: Collect error logs
        if: failure()
        run: |
          mkdir -p error_logs

          [ -f decompile.log ]   && cp decompile.log   error_logs/
          [ -f repackage.log ]   && cp repackage.log   error_logs/

          # Copy decompiled manifest if it exists
          [ -f decompiled/AndroidManifest.xml ] && \
            cp decompiled/AndroidManifest.xml error_logs/

          # apktool.yml
          [ -f decompiled/apktool.yml ] && \
            cp decompiled/apktool.yml error_logs/

          {
            echo "=== OLD PACKAGE ==="
            echo "${{ env.OLD_PKG }}"
            echo "=== NEW PACKAGE ==="
            echo "${{ env.NEW_PKG }}"
            echo "=== APK FILE ==="
            ls -lh "${{ env.APK_NAME }}" 2>&1 || echo "APK not found"
            echo "=== TOOLS ==="
            apktool --version 2>&1 || true
            java -version 2>&1 || true
          } >> error_logs/env_info.txt

          zip -r error_logs.zip error_logs/
          echo "Error zip ready."

      # ── 13. Upload error zip on failure ────────────────────────────────────
      - name: Upload error logs artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.zip
          retention-days: 7
